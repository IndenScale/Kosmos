# 改进的模型配置 - 使用凭证ID引用
[models.embedding]
# 嵌入模型配置
model_name = "qwen3-embedding-0.6b"
credential_id = "fcfdfddc-bfa5-494e-88db-30128f4599cb"  # 引用已创建的凭证ID
config_params = {dimensions = 1536}

[models.reranker]
# 重排序模型配置（可选）
# model_name = "gpt-4-turbo-preview"
# credential_id = "reranker-credential-001"
# config_params = {max_tokens = 4000}

[models.llm]
# 大语言模型配置
model_name = "/Qwen/Qwen3-4B-Instruct-2507"
credential_id = "0964e9ea-caff-47da-ae5c-3a7d351b3056"  # 引用已创建的凭证ID
config_params = {}

[models.vlm]
# 视觉语言模型配置
model_name = "gemma-12b-it-bf16"
credential_id = "e6ec04e2-f954-45cd-a287-c83a4c7c2e04"  # 引用已创建的凭证ID
config_params = {}

[system]
# 系统配置
auto_create_models = true
auto_set_tags = true
overwrite_existing = false

# 安全配置
[security]
# 配置文件访问控制
allow_file_access = true
validate_credential_ownership = true  # 验证凭证所有权
require_credential_validation = true  # 要求凭证验证

# 审计配置
[audit]
enable_config_audit = true  # 启用配置审计
log_auto_configuration = true  # 记录自动配置操作
retain_audit_days = 90  # 审计日志保留天数